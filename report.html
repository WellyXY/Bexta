<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analysis Report — Racoonn</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-HZG09N9S3C"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-HZG09N9S3C');</script>
<style>
:root{--or:#ef6820;--or2:#d45a10;--ink:#1a1714;--ink2:#6b6560;--ink3:#9a9490;--brd:#e8e4de;--bg:#faf9f7;--dark:#18140f;--card:#fff}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}

/* NAV */
nav{display:flex;justify-content:space-between;align-items:center;padding:16px 40px;background:#fff;border-bottom:1px solid var(--brd);position:sticky;top:0;z-index:100}
.nav-logo{font-weight:900;font-size:17px;letter-spacing:-.5px}
.nav-logo span{color:var(--or)}
.btn-sm{background:var(--or);color:#fff;font-size:13px;font-weight:700;padding:9px 20px;border-radius:100px;border:none;cursor:pointer;transition:opacity .15s}
.btn-sm:hover{opacity:.85}

/* HERO BAND */
.report-header{background:var(--dark);padding:52px 40px 48px;position:relative;overflow:hidden}
.report-header::before{content:'';position:absolute;width:600px;height:600px;background:radial-gradient(circle,rgba(239,104,32,.15) 0%,transparent 70%);border-radius:50%;top:-200px;right:-100px;pointer-events:none}
.rh-inner{max-width:1080px;margin:0 auto;position:relative;z-index:2}
.rh-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:100px;padding:5px 14px;font-size:11px;font-weight:700;color:rgba(255,255,255,.55);text-transform:uppercase;letter-spacing:.08em;margin-bottom:20px}
.rh-dot{width:6px;height:6px;border-radius:50%;background:#22c55e}
.rh-url{font-size:clamp(18px,2vw,24px);font-weight:800;color:#fff;margin-bottom:6px;word-break:break-all}
.rh-meta{font-size:12px;color:rgba(255,255,255,.35);margin-bottom:40px;display:flex;gap:16px;flex-wrap:wrap}
.rh-meta span::before{content:'·';margin-right:16px;opacity:.3}
.rh-meta span:first-child::before{display:none}

.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px}
.stat-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:20px 24px}
.stat-val{font-size:clamp(28px,4vw,42px);font-weight:900;color:#fff;letter-spacing:-2px;line-height:1}
.stat-val.green{color:#22c55e}
.stat-val.red{color:#ef4444}
.stat-val.yellow{color:#f59e0b}
.stat-val.or{color:var(--or)}
.stat-lbl{font-size:11px;font-weight:600;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.08em;margin-top:6px}
.score-row{display:flex;align-items:center;gap:12px;margin-top:4px}
.score-bar{flex:1;height:4px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
.score-fill{height:100%;background:var(--or);border-radius:2px;transition:width 1s ease}

.exec-summary{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:24px;margin-top:8px}
.exec-label{font-size:10px;font-weight:700;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px}
.exec-text{font-size:15px;color:rgba(255,255,255,.8);line-height:1.7}

/* SECTIONS */
.section{padding:60px 40px;max-width:1080px;margin:0 auto}
.section-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--ink3);margin-bottom:6px}
.section-h{font-size:clamp(22px,2.5vw,30px);font-weight:900;letter-spacing:-1px;margin-bottom:32px;color:var(--ink)}
.section-h em{font-style:normal;color:var(--or)}
.section-divider{border:none;border-top:1px solid var(--brd);margin:0}

/* FUNNEL */
.funnel-list{display:flex;flex-direction:column;gap:12px}
.funnel-item{background:#fff;border:1px solid var(--brd);border-radius:12px;padding:20px 24px}
.funnel-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:16px}
.funnel-stage{font-weight:700;font-size:15px;color:var(--ink);min-width:120px}
.funnel-pct{font-size:14px;font-weight:800;min-width:50px;text-align:right}
.funnel-pct.high{color:#22c55e}
.funnel-pct.mid{color:#f59e0b}
.funnel-pct.low{color:#ef4444}
.funnel-track{flex:1;height:10px;background:#f3f4f6;border-radius:5px;overflow:hidden;min-width:80px}
.funnel-fill{height:100%;border-radius:5px;transition:width 1.2s cubic-bezier(.4,0,.2,1)}
.funnel-fill.high{background:linear-gradient(90deg,#22c55e,#16a34a)}
.funnel-fill.mid{background:linear-gradient(90deg,#f59e0b,#d97706)}
.funnel-fill.low{background:linear-gradient(90deg,#ef4444,#dc2626)}
.funnel-reason{font-size:13px;color:var(--ink2);line-height:1.5}
.funnel-drop{display:inline-block;background:#fef2f2;color:#ef4444;font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;margin-left:8px}

/* ISSUES */
.issues-list{display:flex;flex-direction:column;gap:14px}
.issue-card{background:#fff;border:1px solid var(--brd);border-radius:14px;padding:24px;display:flex;gap:20px;align-items:flex-start}
.issue-priority{flex-shrink:0;width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;letter-spacing:.03em}
.p1{background:#fef2f2;color:#dc2626}
.p2{background:#fff7ed;color:#ea580c}
.p3{background:#fefce8;color:#ca8a04}
.issue-body{flex:1;min-width:0}
.issue-title{font-weight:700;font-size:16px;margin-bottom:6px;color:var(--ink)}
.issue-desc{font-size:14px;color:var(--ink2);line-height:1.6;margin-bottom:10px}
.issue-tags{display:flex;flex-wrap:wrap;gap:6px}
.issue-tag{background:var(--bg);border:1px solid var(--brd);border-radius:100px;padding:3px 10px;font-size:11px;font-weight:600;color:var(--ink2)}
.issue-affected{flex-shrink:0;text-align:right}
.issue-affected-num{font-size:22px;font-weight:900;color:var(--ink);line-height:1}
.issue-affected-lbl{font-size:10px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em}

/* PERSONAS */
.personas-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.persona-card{background:#fff;border:1px solid var(--brd);border-radius:14px;overflow:hidden;cursor:pointer;transition:box-shadow .2s,border-color .2s}
.persona-card:hover{box-shadow:0 4px 24px rgba(24,20,15,.08);border-color:#d0cac3}
.persona-card.expanded{border-color:var(--or);box-shadow:0 4px 24px rgba(239,104,32,.12)}
.persona-header{padding:20px;display:flex;gap:14px;align-items:flex-start}
.persona-avatar{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;font-weight:700;color:#fff}
.persona-info{flex:1;min-width:0}
.persona-name{font-weight:800;font-size:15px;color:var(--ink);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.outcome-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:100px;letter-spacing:.03em;flex-shrink:0}
.badge-converted{background:#dcfce7;color:#16a34a}
.badge-dropped{background:#fef2f2;color:#dc2626}
.badge-undecided{background:#fef9c3;color:#a16207}
.persona-role{font-size:12px;color:var(--ink2);margin-top:2px}
.persona-loc{font-size:11px;color:var(--ink3)}
.persona-score-row{display:flex;align-items:center;gap:8px;margin-top:10px}
.persona-score-lbl{font-size:11px;color:var(--ink3);font-weight:600;min-width:55px}
.persona-score-bar{flex:1;height:5px;background:#f3f4f6;border-radius:3px;overflow:hidden}
.persona-score-fill{height:100%;border-radius:3px}
.persona-expand{padding:0 20px 20px;display:none}
.persona-expand.open{display:block}
.persona-section{margin-bottom:14px}
.persona-section-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--ink3);margin-bottom:6px}
.persona-section-txt{font-size:13px;color:var(--ink2);line-height:1.6}
.thoughts{display:flex;flex-direction:column;gap:6px}
.thought{display:flex;gap:8px;align-items:flex-start;font-size:13px;line-height:1.5}
.thought-icon{flex-shrink:0;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;margin-top:2px}
.t-norm{background:#dbeafe;color:#1d4ed8}
.t-warn{background:#fff7ed;color:#c2410c}
.t-fail{background:#fef2f2;color:#b91c1c}
.thought-txt{color:var(--ink2);font-style:italic}

/* DEMO BANNER */
.demo-banner{background:linear-gradient(135deg,#fff7ed,#fef3c7);border:1px solid #fed7aa;border-radius:14px;padding:20px 24px;margin-bottom:40px;display:flex;gap:16px;align-items:flex-start}
.demo-banner-icon{font-size:22px;flex-shrink:0}
.demo-banner-title{font-weight:700;font-size:15px;color:#92400e;margin-bottom:4px}
.demo-banner-sub{font-size:13px;color:#b45309;line-height:1.5}

/* BOTTOM CTA */
.bottom-cta{background:var(--dark);padding:80px 40px;text-align:center;position:relative;overflow:hidden}
.bottom-cta::before{content:'';position:absolute;width:500px;height:500px;background:radial-gradient(circle,rgba(239,104,32,.12) 0%,transparent 70%);border-radius:50%;top:-150px;left:50%;transform:translateX(-50%);pointer-events:none}
.bc-inner{max-width:540px;margin:0 auto;position:relative;z-index:2}
.bc-h{font-size:clamp(24px,3vw,36px);font-weight:900;color:#fff;letter-spacing:-1.5px;margin-bottom:12px}
.bc-sub{font-size:15px;color:rgba(255,255,255,.55);margin-bottom:36px}
.bc-form{display:flex;gap:10px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:100px;padding:6px 6px 6px 20px;max-width:480px;margin:0 auto}
.bc-input{flex:1;background:none;border:none;outline:none;font-size:14px;color:#fff;font-family:inherit;min-width:0}
.bc-input::placeholder{color:rgba(255,255,255,.3)}
.bc-btn{background:var(--or);color:#fff;border:none;font-size:14px;font-weight:700;padding:12px 24px;border-radius:100px;cursor:pointer;white-space:nowrap;transition:background .2s;font-family:inherit}
.bc-btn:hover{background:var(--or2)}
.bc-note{font-size:11px;color:rgba(255,255,255,.25);margin-top:12px}

/* LOADING */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:20px}
.spinner{width:40px;height:40px;border:3px solid var(--brd);border-top-color:var(--or);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:15px;color:var(--ink2)}

/* RESPONSIVE */
@media(max-width:768px){
  nav{padding:14px 20px}
  .report-header{padding:36px 20px}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .section{padding:40px 20px}
  .issue-card{flex-direction:column;gap:12px}
  .issue-affected{text-align:left}
  .personas-grid{grid-template-columns:1fr}
  .bottom-cta{padding:60px 20px}
  .bc-form{flex-direction:column;border-radius:14px;padding:12px}
  .bc-btn{border-radius:100px;width:100%}
}
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">Racoo<span>nn</span></a>
  <button class="btn-sm" onclick="location.href='/'">Test Your Page Free →</button>
</nav>

<div id="app"><div class="loading"><div class="spinner"></div><div class="loading-text">Loading report…</div></div></div>

<script>
const AVATAR_COLORS = ['#7c3aed','#2563eb','#059669','#dc2626','#d97706','#db2777','#0891b2','#65a30d','#9333ea','#c026d3'];
const AVATAR_BG = (i) => AVATAR_COLORS[i % AVATAR_COLORS.length];
const initials = (name) => name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);

function scoreColor(s){if(s>=7)return'#22c55e';if(s>=5)return'#f59e0b';return'#ef4444';}
function funnelClass(pct){if(pct>=80)return'high';if(pct>=50)return'mid';return'low';}
function outcomeLabel(o){return o==='converted'?'Converted':o==='dropped'?'Dropped':'Undecided';}
function outcomeBadge(o){return`badge-${o}`;}

function togglePersona(card){
  card.classList.toggle('expanded');
  const exp = card.querySelector('.persona-expand');
  if(exp) exp.classList.toggle('open');
}

function thoughtIcon(type){
  if(type==='norm') return '<div class="thought-icon t-norm">💡</div>';
  if(type==='warn') return '<div class="thought-icon t-warn">⚠</div>';
  return '<div class="thought-icon t-fail">✗</div>';
}

function renderReport(data, isDemo, submittedUrl){
  const url = data.meta?.url || submittedUrl || 'Unknown URL';
  const date = data.meta?.run_date || new Date().toISOString().split('T')[0];
  const model = data.meta?.model || 'claude-sonnet-4-6';
  const s = data.summary || {};
  const avgScore = s.avg_score || 0;
  const scoreW = Math.round(avgScore * 10);
  const personas = data.personas || [];
  const issues = data.top_issues || [];
  const stages = data.stage_dropoff || [];
  const execSummary = data.executive_summary || '';

  const demoBanner = isDemo ? `
  <div class="demo-banner">
    <div class="demo-banner-icon">🦝</div>
    <div>
      <div class="demo-banner-title">This is a sample report</div>
      <div class="demo-banner-sub">Your personalized analysis for <strong>${url}</strong> is being prepared. We'll email you when it's ready — usually within 28 minutes.</div>
    </div>
  </div>` : '';

  const stagesHtml = stages.map(st=>{
    const remain = Math.round(100 - st.drop_pct);
    const cls = funnelClass(remain);
    return `<div class="funnel-item">
      <div class="funnel-top">
        <div class="funnel-stage">${st.stage}</div>
        <div class="funnel-track"><div class="funnel-fill ${cls}" style="width:0%" data-pct="${remain}"></div></div>
        <div class="funnel-pct ${cls}">${remain}%
          ${st.dropped > 0 ? `<span class="funnel-drop">−${st.dropped}</span>` : ''}
        </div>
      </div>
      <div class="funnel-reason">${st.main_reason}</div>
    </div>`;
  }).join('');

  const issuesHtml = issues.map(issue=>{
    const cls = issue.priority==='P1'?'p1':issue.priority==='P2'?'p2':'p3';
    const tags = (issue.segments||[]).map(t=>`<span class="issue-tag">${t}</span>`).join('');
    return `<div class="issue-card">
      <div class="issue-priority ${cls}">${issue.priority}</div>
      <div class="issue-body">
        <div class="issue-title">${issue.title}</div>
        <div class="issue-desc">${issue.description}</div>
        ${tags ? `<div class="issue-tags">${tags}</div>` : ''}
      </div>
      <div class="issue-affected">
        <div class="issue-affected-num">${issue.affected}</div>
        <div class="issue-affected-lbl">affected</div>
      </div>
    </div>`;
  }).join('');

  const personasHtml = personas.slice(0,20).map((p,i)=>{
    const thoughts = (p.thoughts||[]).map(t=>`<div class="thought">${thoughtIcon(t.type)}<div class="thought-txt">"${t.quote}"</div></div>`).join('');
    const sc = p.score || 0;
    return `<div class="persona-card" onclick="togglePersona(this)">
      <div class="persona-header">
        <div class="persona-avatar" style="background:${AVATAR_BG(i)}">${initials(p.name||'?')}</div>
        <div class="persona-info">
          <div class="persona-name">
            ${p.name}
            <span class="outcome-badge ${outcomeBadge(p.outcome)}">${outcomeLabel(p.outcome)}</span>
          </div>
          <div class="persona-role">${p.role||''} · ${p.age||''} yrs</div>
          <div class="persona-loc">📍 ${p.location||''}</div>
          <div class="persona-score-row">
            <div class="persona-score-lbl">Score ${sc}/10</div>
            <div class="persona-score-bar"><div class="persona-score-fill" style="width:0%;background:${scoreColor(sc)}" data-pct="${sc*10}"></div></div>
          </div>
        </div>
      </div>
      <div class="persona-expand">
        ${p.key_moment ? `<div class="persona-section"><div class="persona-section-lbl">Key Moment</div><div class="persona-section-txt">${p.key_moment}</div></div>` : ''}
        ${p.biggest_gap ? `<div class="persona-section"><div class="persona-section-lbl">Biggest Gap</div><div class="persona-section-txt">${p.biggest_gap}</div></div>` : ''}
        ${thoughts ? `<div class="persona-section"><div class="persona-section-lbl">Thoughts</div><div class="thoughts">${thoughts}</div></div>` : ''}
      </div>
    </div>`;
  }).join('');

  document.getElementById('app').innerHTML = `
    <div class="report-header">
      <div class="rh-inner">
        <div class="rh-badge"><span class="rh-dot"></span>Analysis Report</div>
        <div class="rh-url">${url}</div>
        <div class="rh-meta">
          <span>${date}</span>
          <span>${s.total_personas||0} personas</span>
          <span>${model}</span>
        </div>
        <div class="stats-grid">
          <div class="stat-card"><div class="stat-val or">${s.conversion_rate||0}%</div><div class="stat-lbl">Conversion Rate</div></div>
          <div class="stat-card"><div class="stat-val green">${s.converted||0}</div><div class="stat-lbl">Converted</div></div>
          <div class="stat-card"><div class="stat-val red">${s.dropped||0}</div><div class="stat-lbl">Dropped</div></div>
          <div class="stat-card">
            <div class="stat-val" style="color:#fff">${avgScore}</div>
            <div class="stat-lbl">Avg Score /10</div>
            <div class="score-row"><div class="score-bar"><div class="score-fill" id="main-score-fill" style="width:0%" data-pct="${scoreW}"></div></div></div>
          </div>
        </div>
        ${execSummary ? `<div class="exec-summary"><div class="exec-label">Executive Summary</div><div class="exec-text">${execSummary}</div></div>` : ''}
      </div>
    </div>

    <hr class="section-divider">

    <div class="section">
      ${demoBanner}
      <div class="section-title">Conversion Funnel</div>
      <div class="section-h">Where users <em>dropped off</em></div>
      <div class="funnel-list">${stagesHtml}</div>
    </div>

    <hr class="section-divider">

    <div class="section">
      <div class="section-title">Critical Issues</div>
      <div class="section-h">What's <em>breaking</em> your conversion</div>
      <div class="issues-list">${issuesHtml}</div>
    </div>

    <hr class="section-divider">

    <div class="section">
      <div class="section-title">Persona Breakdown</div>
      <div class="section-h">${personas.length} persona <em>reactions</em></div>
      <div class="personas-grid">${personasHtml}</div>
    </div>

    <div class="bottom-cta">
      <div class="bc-inner">
        <div class="bc-h">Get your own report</div>
        <div class="bc-sub">Paste your URL and 5,000 AI personas will analyze it in 28 minutes.</div>
        <form class="bc-form" onsubmit="handleBottomSubmit(event)">
          <input class="bc-input" id="bc-url" type="url" placeholder="https://yourproduct.com" required>
          <button class="bc-btn" type="submit">Analyze Free →</button>
        </form>
        <div class="bc-note">No setup. No credit card. First 50 teams free.</div>
      </div>
    </div>
  `;

  // Animate bars
  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{
      document.querySelectorAll('.funnel-fill[data-pct]').forEach(el=>{el.style.width=el.dataset.pct+'%'});
      document.querySelectorAll('.persona-score-fill[data-pct]').forEach(el=>{el.style.width=el.dataset.pct+'%'});
      const sf = document.getElementById('main-score-fill');
      if(sf) sf.style.width = sf.dataset.pct+'%';
    });
  });
}

async function handleBottomSubmit(e){
  e.preventDefault();
  const url = document.getElementById('bc-url').value.trim();
  const btn = e.target.querySelector('button');
  btn.textContent = 'Submitting…';btn.disabled=true;
  try{
    const res = await fetch('/api/waitlist',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url,email:''})});
    const data = await res.json();
    const demoUrl = data.demoUrl || `/report/demo?url=${encodeURIComponent(url)}`;
    window.location.href = demoUrl;
  }catch(err){
    btn.textContent='Analyze Free →';btn.disabled=false;
  }
}

async function init(){
  const parts = window.location.pathname.split('/');
  const id = parts[parts.length-1];
  const params = new URLSearchParams(window.location.search);
  const submittedUrl = params.get('url') || '';
  const isDemo = id === 'demo';

  try{
    const endpoint = isDemo
      ? `/api/report/demo?url=${encodeURIComponent(submittedUrl)}`
      : `/api/report/${id}`;
    const res = await fetch(endpoint);
    if(!res.ok) throw new Error('Not found');
    const data = await res.json();
    renderReport(data, isDemo, submittedUrl);
    if(isDemo && submittedUrl){
      gtag('event','demo_report_view',{url:submittedUrl});
    }
  }catch(err){
    document.getElementById('app').innerHTML=`<div class="loading"><div style="font-size:48px">🦝</div><div class="loading-text">Report not found. <a href="/" style="color:var(--or)">Go back →</a></div></div>`;
  }
}

init();
</script>
</body>
</html>
