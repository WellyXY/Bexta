<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Betax Admin</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0f0d0b;--s1:#1a1714;--s2:#201e1b;--s3:#262320;
      --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.12);
      --text:#e8e4df;--muted:#6b6560;--dim:#3a3640;
      --orange:#ef6820;--or-dim:rgba(239,104,32,.12);--or-bdr:rgba(239,104,32,.3);
      --green:#4ade80;--gn-dim:rgba(74,222,128,.1);
      --red:#f87171;--rd-dim:rgba(248,113,113,.1);
      --yellow:#fbbf24;--yw-dim:rgba(251,191,36,.1);
    }
    html,body{height:100%;overflow:hidden}
    body{font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:13px;display:flex}

    /* ── Sidebar ── */
    .sidebar{width:220px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;background:#0d0b09}
    .sb-logo{padding:20px 20px 0;margin-bottom:28px}
    .sb-logo-txt{font-size:17px;font-weight:900;letter-spacing:-.5px;color:#fff}
    .sb-logo-txt em{color:var(--orange);font-style:normal}
    .sb-logo-sub{font-size:10px;color:var(--dim);margin-top:2px;text-transform:uppercase;letter-spacing:.1em;font-weight:600}
    .sb-section{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--dim);padding:0 20px 8px}
    .sb-nav{flex:1;padding:0 10px}
    .sb-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;transition:all .12s;color:var(--muted);margin-bottom:2px;border:1px solid transparent}
    .sb-item:hover{background:var(--s1);color:var(--text)}
    .sb-item.active{background:var(--or-dim);border-color:var(--or-bdr);color:var(--orange)}
    .sb-icon{font-size:14px;width:18px;text-align:center;flex-shrink:0}
    .sb-label{font-size:13px;font-weight:500;flex:1}
    .sb-badge{font-size:10px;font-weight:700;background:rgba(255,255,255,.07);color:var(--muted);padding:1px 7px;border-radius:100px}
    .sb-item.active .sb-badge{background:rgba(239,104,32,.2);color:var(--orange)}
    .sb-footer{padding:16px 20px;border-top:1px solid var(--border)}
    .sb-footer-txt{font-size:10px;color:var(--dim)}

    /* ── Main area ── */
    .main{flex:1;height:100vh;overflow-y:auto;display:flex;flex-direction:column}
    .topbar{height:48px;flex-shrink:0;display:flex;align-items:center;padding:0 28px;border-bottom:1px solid var(--border);background:rgba(15,13,11,.8);backdrop-filter:blur(12px);position:sticky;top:0;z-index:50;gap:12px}
    .tb-title{font-size:14px;font-weight:700;color:#fff}
    .tb-sub{font-size:11px;color:var(--muted)}
    .tb-actions{margin-left:auto;display:flex;gap:8px}
    .btn{font-size:11px;padding:5px 12px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-family:inherit;transition:all .12s;white-space:nowrap}
    .btn:hover{border-color:var(--border2);color:var(--text)}
    .btn-primary{background:var(--or-dim);border-color:var(--or-bdr);color:var(--orange)}
    .btn-primary:hover{background:rgba(239,104,32,.2)}
    .content{flex:1;padding:28px}

    /* ── Stats row ── */
    .stats{display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap}
    .stat{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:16px 20px;min-width:120px}
    .stat-num{font-size:26px;font-weight:900;line-height:1;letter-spacing:-.5px}
    .stat-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-top:5px}
    .c-orange{color:var(--orange)}.c-green{color:var(--green)}.c-red{color:var(--red)}.c-yellow{color:var(--yellow)}.c-white{color:#fff}

    /* ── Table ── */
    .table-wrap{background:var(--s1);border:1px solid var(--border);border-radius:10px;overflow:hidden}
    table{width:100%;border-collapse:collapse}
    thead th{padding:10px 14px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);border-bottom:1px solid var(--border)}
    tbody tr{border-bottom:1px solid rgba(255,255,255,.03);transition:background .1s}
    tbody tr:hover{background:rgba(255,255,255,.02)}
    tbody tr:last-child{border-bottom:none}
    td{padding:11px 14px;color:#c0bcb8;vertical-align:top;font-size:12px}
    td.td-url{color:#fff;font-weight:500;max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    td.td-mono{font-family:monospace;font-size:11px;color:var(--muted)}
    td.td-dim{color:var(--muted);font-size:11px}
    .empty{text-align:center;padding:48px;color:var(--dim);font-size:13px}

    /* ── Section header ── */
    .sh{display:flex;align-items:center;gap:10px;margin-bottom:14px}
    .sh-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);white-space:nowrap}
    .sh-line{flex:1;height:1px;background:var(--border)}

    /* ── Report list ── */
    .report-list{display:flex;flex-direction:column;gap:8px}
    .rcard{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:16px 18px;cursor:pointer;transition:all .12s;display:flex;align-items:center;gap:16px}
    .rcard:hover{border-color:var(--border2);background:var(--s2)}
    .rcard-icon{font-size:18px;width:40px;height:40px;background:var(--or-dim);border:1px solid var(--or-bdr);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .rcard-info{flex:1;min-width:0}
    .rcard-url{font-size:13px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
    .rcard-meta{font-size:11px;color:var(--muted)}
    .rcard-stats{display:flex;gap:16px;flex-shrink:0}
    .rcs{text-align:center}
    .rcs-num{font-size:18px;font-weight:800;line-height:1}
    .rcs-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:2px}
    .rcard-arrow{color:var(--dim);font-size:16px;flex-shrink:0}

    /* ── Report detail ── */
    .rd-header{margin-bottom:24px}
    .rd-back{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);cursor:pointer;padding:5px 0;margin-bottom:12px;transition:color .12s}
    .rd-back:hover{color:var(--text)}
    .rd-url-tag{display:inline-block;font-size:11px;font-family:monospace;background:var(--or-dim);border:1px solid var(--or-bdr);color:var(--orange);padding:3px 10px;border-radius:100px;margin-bottom:8px}
    .rd-title{font-size:20px;font-weight:800;letter-spacing:-.4px;color:#fff;margin-bottom:4px}
    .rd-meta{font-size:11px;color:var(--muted)}

    /* ── Funnel ── */
    .funnel-card{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:20px}
    .fc-title{font-size:14px;font-weight:700;color:#fff;margin-bottom:4px}
    .fc-sub{font-size:11px;color:var(--muted);margin-bottom:18px}
    .f-row{display:grid;grid-template-columns:100px 1fr 40px 44px;align-items:center;gap:10px;margin-bottom:4px}
    .f-stage-lbl{font-size:11px;font-weight:600;color:var(--text);text-align:right}
    .f-bar-wrap{height:30px;background:rgba(255,255,255,.03);border-radius:6px;overflow:hidden;position:relative}
    .f-bar{height:100%;border-radius:6px;display:flex;align-items:center;padding-left:10px;font-size:11px;font-weight:700;transition:width .9s cubic-bezier(.16,1,.3,1);width:0}
    .fb-ok{background:linear-gradient(90deg,rgba(74,222,128,.22),rgba(74,222,128,.08));color:var(--green)}
    .fb-warn{background:linear-gradient(90deg,rgba(251,191,36,.2),rgba(251,191,36,.06));color:var(--yellow)}
    .fb-danger{background:linear-gradient(90deg,rgba(248,113,113,.22),rgba(248,113,113,.07));color:var(--red)}
    .fb-end{background:linear-gradient(90deg,rgba(239,104,32,.28),rgba(239,104,32,.08));color:var(--orange)}
    .f-drop{font-size:10px;font-weight:700;padding:2px 7px;border-radius:100px;text-align:center;white-space:nowrap;background:var(--rd-dim);border:1px solid rgba(248,113,113,.18);color:var(--red)}
    .f-drop.none{background:transparent;border-color:transparent;color:var(--dim)}
    .f-pct-lbl{font-size:11px;font-weight:700;color:var(--muted);text-align:right}
    .f-reason{grid-column:2/-1;font-size:11px;color:var(--muted);line-height:1.5;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,.04);margin-bottom:4px}
    .f-outcomes{display:flex;gap:20px;padding-top:14px;border-top:1px solid var(--border);margin-top:8px;flex-wrap:wrap}
    .f-oc{display:flex;align-items:center;gap:6px;font-size:12px}
    .f-oc-dot{width:7px;height:7px;border-radius:50%}
    .f-oc-val{font-weight:800}
    .f-oc-rate{margin-left:auto;font-size:12px;color:var(--muted)}

    /* ── Two col ── */
    .two-col{display:grid;grid-template-columns:1fr 300px;gap:14px;margin-bottom:20px;align-items:start}

    /* ── Issues ── */
    .issue-list{display:flex;flex-direction:column;gap:8px}
    .issue{background:var(--s1);border:1px solid var(--border);border-radius:9px;padding:13px 15px;display:flex;gap:10px}
    .issue-pri{font-size:9px;font-weight:800;padding:3px 7px;border-radius:5px;flex-shrink:0;letter-spacing:.04em;margin-top:2px}
    .p1{background:rgba(248,113,113,.14);color:var(--red)}
    .p2{background:rgba(251,191,36,.12);color:var(--yellow)}
    .p3{background:rgba(74,222,128,.1);color:var(--green)}
    .issue-body{flex:1;min-width:0}
    .issue-title{font-size:12px;font-weight:600;color:#fff;margin-bottom:3px}
    .issue-desc{font-size:11px;color:var(--muted);line-height:1.5}
    .issue-segs{display:flex;flex-wrap:wrap;gap:3px;margin-top:6px}
    .iseg{font-size:9px;padding:2px 7px;border-radius:100px;background:rgba(255,255,255,.04);color:var(--muted)}
    .issue-count{flex-shrink:0;text-align:right}
    .issue-count .n{font-size:20px;font-weight:800;color:var(--orange);line-height:1}
    .issue-count .l{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.06em}

    /* ── Outcome panel ── */
    .oc-panel{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:18px}
    .oc-panel-title{font-size:11px;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:.07em;margin-bottom:14px}
    .oc-row{margin-bottom:12px}
    .oc-row-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px}
    .oc-label{font-size:12px;font-weight:600}
    .oc-val{font-size:12px;font-weight:700}
    .oc-track{height:7px;background:rgba(255,255,255,.04);border-radius:4px;overflow:hidden}
    .oc-fill{height:100%;border-radius:4px;transition:width .9s cubic-bezier(.16,1,.3,1)}
    .gf{background:linear-gradient(90deg,#4ade80,#22c55e)}
    .yf{background:linear-gradient(90deg,#fbbf24,#f59e0b)}
    .rf{background:linear-gradient(90deg,#f87171,#ef4444)}
    .divh{height:1px;background:var(--border);margin:14px 0}
    .score-big{text-align:center;padding:6px 0}
    .score-num{font-size:38px;font-weight:900;color:var(--orange);letter-spacing:-1px;line-height:1}
    .score-sub{font-size:11px;color:var(--muted);margin-top:3px}
    .channel-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
    .ch-name{font-size:11px;color:var(--muted);width:80px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .ch-track{flex:1;height:5px;background:rgba(255,255,255,.04);border-radius:3px;overflow:hidden}
    .ch-fill{height:100%;border-radius:3px;background:var(--orange)}
    .ch-pct{font-size:11px;font-weight:700;color:var(--text);width:28px;text-align:right}


    /* ── Demographics ── */
    .demo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
    .demo-card{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:16px}
    .demo-card-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:12px}
    .demo-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
    .demo-bar-label{font-size:11px;color:var(--muted);width:90px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .demo-bar-track{flex:1;height:6px;background:rgba(255,255,255,.04);border-radius:3px;overflow:hidden}
    .demo-bar-fill{height:100%;border-radius:3px}
    .demo-bar-val{font-size:11px;font-weight:700;color:var(--text);width:36px;text-align:right;flex-shrink:0}
    .demo-bar-sub{font-size:10px;color:var(--dim);width:20px;text-align:right;flex-shrink:0}

    /* ── Recommendations ── */
    .rec-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;margin-bottom:24px}
    .rec-card{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:14px}
    .rec-card.top{border-color:var(--or-bdr);background:var(--or-dim)}
    .rec-rank{display:flex;align-items:center;gap:8px;margin-bottom:8px}
    .rec-rank-num{font-size:10px;font-weight:800;background:rgba(255,255,255,.06);color:var(--muted);width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center}
    .rec-card.top .rec-rank-num{background:rgba(239,104,32,.2);color:var(--orange)}
    .rec-segment{font-size:12px;font-weight:700;color:#fff}
    .rec-rate{font-size:18px;font-weight:900;color:var(--green);margin-bottom:4px}
    .rec-desc{font-size:11px;color:var(--muted);line-height:1.5}
    .rec-tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:8px}
    .rec-tag{font-size:10px;padding:2px 7px;border-radius:100px;background:rgba(255,255,255,.04);color:var(--muted)}
    /* ── Filter tabs ── */
    .ftabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
    .ftab{font-size:11px;padding:5px 12px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-family:inherit;transition:all .12s;display:flex;align-items:center;gap:4px}
    .ftab:hover{border-color:var(--border2);color:var(--text)}
    .ftab.active{background:var(--or-dim);border-color:var(--or-bdr);color:var(--orange)}
    .ftab .fbadge{font-size:9px;background:rgba(255,255,255,.06);color:var(--muted);padding:1px 5px;border-radius:100px}
    .ftab.active .fbadge{background:rgba(239,104,32,.2);color:var(--orange)}

    /* ── Persona grid ── */
    .pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:10px}
    .pcard{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:14px;transition:border-color .12s}
    .pcard:hover{border-color:var(--border2)}
    .pc-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
    .pc-avatar{width:36px;height:36px;border-radius:8px;flex-shrink:0;overflow:hidden;background:var(--s3)}
    .pc-avatar img{width:100%;height:100%;object-fit:cover}
    .pc-info{flex:1;min-width:0}
    .pc-name{font-size:13px;font-weight:700;color:#fff}
    .pc-sub{font-size:10px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .pc-outcome{font-size:10px;font-weight:700;padding:2px 8px;border-radius:5px;flex-shrink:0;letter-spacing:.02em}
    .oc-converted{background:var(--gn-dim);color:var(--green)}
    .oc-dropped{background:var(--rd-dim);color:var(--red)}
    .oc-undecided{background:var(--yw-dim);color:var(--yellow)}
    .pc-score{display:flex;align-items:center;gap:7px;margin-bottom:9px}
    .pc-score-track{flex:1;height:3px;background:rgba(255,255,255,.06);border-radius:2px}
    .pc-score-fill{height:3px;border-radius:2px}
    .pc-score-val{font-size:11px;font-weight:700;width:28px;text-align:right}
    .pc-expect{font-size:11px;color:var(--muted);line-height:1.4;margin-bottom:8px;padding:7px 9px;background:var(--s2);border-radius:6px;font-style:italic;border-left:2px solid rgba(239,104,32,.3)}
    .pc-thoughts{display:flex;flex-direction:column;gap:3px;margin-bottom:9px}
    .thought{font-size:10px;line-height:1.4;padding:5px 8px;border-radius:5px;display:flex;gap:5px;align-items:flex-start}
    .ti{flex-shrink:0;width:11px;margin-top:1px;font-size:9px}
    .t-norm{background:rgba(255,255,255,.025);color:#b0aca8}
    .t-warn{background:rgba(251,191,36,.07);color:#c09038}
    .t-fail{background:rgba(248,113,113,.07);color:#b06868}
    .pc-tags{display:flex;gap:3px;flex-wrap:wrap}
    .ptag{font-size:9px;padding:2px 7px;border-radius:100px;background:rgba(255,255,255,.04);color:var(--muted)}

    /* ── Loading / Error ── */
    .loading{display:flex;align-items:center;justify-content:center;height:200px;color:var(--muted);font-size:13px}
  </style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
  <div class="sb-logo">
    <div class="sb-logo-txt">Bet<em>ax</em></div>
    <div class="sb-logo-sub">Admin Dashboard</div>
  </div>
  <div class="sb-nav">
    <div class="sb-section">Navigation</div>
    <div class="sb-item active" id="nav-waitlist" onclick="showTab('waitlist')">
      <div class="sb-icon">📋</div>
      <div class="sb-label">Waitlist</div>
      <div class="sb-badge" id="sb-wl-count">—</div>
    </div>
    <div class="sb-item" id="nav-reports" onclick="showTab('reports')">
      <div class="sb-icon">📊</div>
      <div class="sb-label">Reports</div>
      <div class="sb-badge" id="sb-rp-count">—</div>
    </div>
    <div class="sb-item" id="nav-phreport" onclick="showTab('phreport')">
      <div class="sb-icon">🚀</div>
      <div class="sb-label">PH Audit</div>
      <div class="sb-badge" id="sb-ph-count">20</div>
    </div>
  </div>
  <div class="sb-footer">
    <div class="sb-footer-txt">© 2026 Betax</div>
  </div>
</div>

<!-- Main -->
<div class="main">
  <div class="topbar">
    <div class="tb-title" id="tb-title">Waitlist</div>
    <div class="tb-sub" id="tb-sub">—</div>
    <div class="tb-actions" id="tb-actions"></div>
  </div>
  <div class="content" id="main-content">
    <div class="loading">Loading…</div>
  </div>
</div>

<script>
const token = new URLSearchParams(location.search).get('token') || '';
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fmt = ts => {
  if (!ts) return '—';
  const d = new Date(ts);
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) + ' ' + d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
};
const api = path => fetch(`${path}?token=${token}`).then(r => r.ok ? r.json() : Promise.reject(r.status));
const avatarUrl = name => `https://i.pravatar.cc/80?u=${encodeURIComponent(name)}`;

let currentTab = 'waitlist';
let waitlistData = null;
let reportsData = null;

// ── Init ──────────────────────────────────────────────────
let phReportData = null;

async function init() {
  try {
    const [wl, rp, ph] = await Promise.all([
      api('/api/admin/waitlist'),
      api('/api/admin/reports'),
      api('/api/admin/ph-report'),
    ]);
    waitlistData = wl;
    reportsData = rp;
    phReportData = ph;
    document.getElementById('sb-wl-count').textContent = wl.count;
    document.getElementById('sb-rp-count').textContent = rp.length;
    showTab('waitlist');
  } catch(e) {
    document.getElementById('main-content').innerHTML = `<div class="loading">Unauthorized — check your token.</div>`;
  }
}

// ── Tab switching ─────────────────────────────────────────
function showTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.sb-item').forEach(el => el.classList.remove('active'));
  document.getElementById('nav-' + tab).classList.add('active');
  if (tab === 'waitlist') renderWaitlist();
  else if (tab === 'reports') renderReportList();
  else if (tab === 'phreport') renderPHReport();
}

// ── Waitlist ──────────────────────────────────────────────
function renderWaitlist() {
  document.getElementById('tb-title').textContent = 'Waitlist';
  const now = new Date();
  const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const weekStart  = new Date(todayStart); weekStart.setDate(weekStart.getDate() - 7);
  const entries = (waitlistData && waitlistData.entries) || [];
  const today = entries.filter(e => new Date(e.created_at) >= todayStart).length;
  const week  = entries.filter(e => new Date(e.created_at) >= weekStart).length;

  document.getElementById('tb-sub').textContent = `Updated ${new Date().toLocaleTimeString()}`;
  document.getElementById('tb-actions').innerHTML = `
    <button class="btn btn-primary" onclick="exportCSV()">↓ Export CSV</button>
    <button class="btn" onclick="refreshWaitlist()">↻ Refresh</button>
  `;

  document.getElementById('main-content').innerHTML = `
    <div class="stats">
      <div class="stat"><div class="stat-num c-white">${entries.length}</div><div class="stat-lbl">Total signups</div></div>
      <div class="stat"><div class="stat-num c-orange">${today}</div><div class="stat-lbl">Today</div></div>
      <div class="stat"><div class="stat-num c-orange">${week}</div><div class="stat-lbl">This week</div></div>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>#</th><th>URL</th><th>Email</th><th>Submitted</th><th>IP</th><th>Referrer</th>
        </tr></thead>
        <tbody id="wl-tbody"></tbody>
      </table>
    </div>
  `;

  if (!entries.length) {
    document.getElementById('wl-tbody').innerHTML = `<tr><td colspan=6 class="empty">No entries yet</td></tr>`;
    return;
  }
  document.getElementById('wl-tbody').innerHTML = entries.map((e, i) => `
    <tr>
      <td class="td-dim">${entries.length - i}</td>
      <td class="td-url" title="${esc(e.url)}">${esc(e.url)}</td>
      <td style="color:#c0bcb8;font-size:12px">${esc(e.email||'—')}</td>
      <td class="td-dim">${fmt(e.created_at)}</td>
      <td class="td-mono">${esc(e.ip||'—')}</td>
      <td class="td-dim" style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(e.referrer||'')}">
        ${esc(e.referrer||'—')}
      </td>
    </tr>
  `).join('');
}

async function refreshWaitlist() {
  try {
    waitlistData = await api('/api/admin/waitlist');
    document.getElementById('sb-wl-count').textContent = waitlistData.count;
    renderWaitlist();
  } catch {}
}

function exportCSV() {
  const entries = (waitlistData && waitlistData.entries) || [];
  const rows = [['id','url','email','created_at','ip','referrer']];
  entries.forEach(e => rows.push([e.id, e.url, e.email||'', e.created_at, e.ip||'', e.referrer||'']));
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = 'betax-waitlist.csv';
  a.click();
}

function renderDemographics(personas) {
  if (!personas.length) return;

  // Age groups
  const ageGroups = { '18–24':0, '25–30':0, '31–36':0, '37–42':0, '43–50':0, '51+':0 };
  personas.forEach(p => {
    const a = p.age || 0;
    if (a <= 24) ageGroups['18–24']++;
    else if (a <= 30) ageGroups['25–30']++;
    else if (a <= 36) ageGroups['31–36']++;
    else if (a <= 42) ageGroups['37–42']++;
    else if (a <= 50) ageGroups['43–50']++;
    else ageGroups['51+']++;
  });

  // Countries
  const countries = {};
  personas.forEach(p => {
    const c = (p.location || '').split(', ').pop() || '?';
    countries[c] = (countries[c] || 0) + 1;
  });
  const topCountries = Object.entries(countries).sort((a,b)=>b[1]-a[1]).slice(0,6);

  // Roles (top 6)
  const roles = {};
  personas.forEach(p => { roles[p.role||'?'] = (roles[p.role||'?'] || 0) + 1; });
  const topRoles = Object.entries(roles).sort((a,b)=>b[1]-a[1]).slice(0,6);

  // Tech comfort buckets
  const techBuckets = { 'Low (1–3)':0, 'Mid (4–6)':0, 'High (7–10)':0 };
  personas.forEach(p => {
    const t = p.tech_comfort || p.tech || 5;
    if (t <= 3) techBuckets['Low (1–3)']++;
    else if (t <= 6) techBuckets['Mid (4–6)']++;
    else techBuckets['High (7–10)']++;
  });

  // Channels (top 6)
  const channels = {};
  personas.forEach(p => { channels[p.channel||'?'] = (channels[p.channel||'?'] || 0) + 1; });
  const topChannels = Object.entries(channels).sort((a,b)=>b[1]-a[1]).slice(0,6);

  // Use cases (top 6)
  const usecases = {};
  personas.forEach(p => { usecases[p.use_case||'?'] = (usecases[p.use_case||'?'] || 0) + 1; });
  const topUsecases = Object.entries(usecases).sort((a,b)=>b[1]-a[1]).slice(0,6);

  const n = personas.length;
  const colors = ['#ef6820','#4ade80','#60a5fa','#f59e0b','#a78bfa','#f87171'];

  function barsHTML(entries, total) {
    const max = entries[0]?.[1] || 1;
    return entries.map(([label, count], i) => {
      const pct = Math.round(count / total * 100);
      const barW = Math.round(count / max * 100);
      return `<div class="demo-bar-row">
        <div class="demo-bar-label" title="${esc(label)}">${esc(label)}</div>
        <div class="demo-bar-track"><div class="demo-bar-fill" style="width:${barW}%;background:${colors[i%colors.length]}"></div></div>
        <div class="demo-bar-val">${count}</div>
        <div class="demo-bar-sub">${pct}%</div>
      </div>`;
    }).join('');
  }

  document.getElementById('demo-grid').innerHTML = `
    <div class="demo-card">
      <div class="demo-card-title">Age distribution</div>
      ${barsHTML(Object.entries(ageGroups).filter(([,v])=>v>0), n)}
    </div>
    <div class="demo-card">
      <div class="demo-card-title">Top countries</div>
      ${barsHTML(topCountries, n)}
    </div>
    <div class="demo-card">
      <div class="demo-card-title">Top roles</div>
      ${barsHTML(topRoles, n)}
    </div>
    <div class="demo-card">
      <div class="demo-card-title">Tech comfort</div>
      ${barsHTML(Object.entries(techBuckets), n)}
    </div>
    <div class="demo-card">
      <div class="demo-card-title">Discovery channel</div>
      ${barsHTML(topChannels, n)}
    </div>
    <div class="demo-card">
      <div class="demo-card-title">Use case</div>
      ${barsHTML(topUsecases, n)}
    </div>
  `;
}

function renderRecommendations(personas) {
  if (!personas.length) return;

  // Build segment conversion rates
  const segments = {};
  function addSeg(key, p) {
    if (!segments[key]) segments[key] = { total:0, converted:0, dropped:0, label:key };
    segments[key].total++;
    if (p.outcome === 'converted') segments[key].converted++;
    if (p.outcome === 'dropped') segments[key].dropped++;
  }

  personas.forEach(p => {
    // By channel
    addSeg('ch:' + (p.channel||'?'), p);
    // By tech level
    const t = p.tech_comfort || p.tech || 5;
    const tl = t >= 7 ? 'Tech-savvy (7–10)' : t >= 4 ? 'Mid-tech (4–6)' : 'Low-tech (1–3)';
    addSeg('tech:' + tl, p);
    // By role category
    const r = p.role || '?';
    const cat = /founder|maker|builder|indie/i.test(r) ? 'Founders & makers' :
                /product|PM|manager/i.test(r) ? 'Product managers' :
                /developer|engineer/i.test(r) ? 'Developers' :
                /designer|UX|UI/i.test(r) ? 'Designers' :
                /marketing|growth/i.test(r) ? 'Marketers & growth' :
                /creator|blogger|writer|social/i.test(r) ? 'Creators & writers' :
                /agency|freelance/i.test(r) ? 'Agencies & freelancers' : 'Other';
    addSeg('role:' + cat, p);
    // By age group
    const a = p.age || 0;
    const ag = a <= 25 ? '18–25' : a <= 35 ? '26–35' : a <= 45 ? '36–45' : '46+';
    addSeg('age:' + ag, p);
  });

  // Score: conversion_rate weighted by total
  const scored = Object.values(segments)
    .filter(s => s.total >= 5)
    .map(s => ({ ...s, conv_rate: Math.round(s.converted / s.total * 100), key: s.label }))
    .sort((a, b) => b.conv_rate - a.conv_rate)
    .slice(0, 8);

  const descs = {
    'ch:Product Hunt': 'High-intent early adopters actively looking for new tools.',
    'ch:Twitter/X': 'Tech-forward builders who share and discover tools socially.',
    'ch:LinkedIn': 'Professional evaluators with budget and decision-making power.',
    'ch:Instagram': 'Creative professionals and personal brand builders.',
    'ch:Friend referral': 'High-trust visitors — come pre-validated by a peer.',
    'ch:Newsletter': 'Engaged readers who take action on curated recommendations.',
    'ch:Reddit': 'Skeptical but highly engaged — need proof before converting.',
    'ch:YouTube': 'Visual learners who want to see the product in action.',
    'tech:Tech-savvy (7–10)': 'Developers, founders, PMs — immediately grasp the value and trust the CLI output.',
    'tech:Mid-tech (4–6)': 'Marketers and designers — understand the concept but need clearer pricing.',
    'tech:Low-tech (1–3)': 'Non-technical users — alienated by jargon and terminal UI.',
    'role:Founders & makers': 'Core audience — ship fast, need data, willing to pay for speed.',
    'role:Product managers': 'Key segment — have budget and authority; need B2B persona examples.',
    'role:Developers': 'Power users — excited by CLI; need docs and API reference.',
    'role:Designers': 'High intent for portfolio/agency use cases; GDPR-sensitive.',
    'role:Marketers & growth': 'Conversion-obsessed; price-sensitive without a clear ROI calc.',
    'role:Creators & writers': 'Interested in audience insight but see a product-market fit gap.',
    'role:Agencies & freelancers': 'High potential for repeat use; need white-label and bulk pricing.',
    'age:18–25': 'Student and early-career audience — price-sensitive but enthusiastic adopters.',
    'age:26–35': 'Sweet spot — building products, have some budget, early adopter mindset.',
    'age:36–45': 'Experienced buyers — higher bar for trust signals and company credibility.',
    'age:46+': 'Skeptical of new tools; need proof points and enterprise-grade trust signals.',
  };

  const html = scored.map((s, i) => {
    const isTop = i < 3;
    const prefix = s.label.includes(':') ? s.label.split(':')[0] : '';
    const cleanLabel = s.label.replace(/^(ch|tech|role|age):/, '');
    const desc = descs[s.label] || 'High-converting segment worth targeting.';
    const tagType = { ch:'Channel', tech:'Tech level', role:'Role', age:'Age' }[prefix] || '';
    return `
      <div class="rec-card${isTop?' top':''}">
        <div class="rec-rank">
          <div class="rec-rank-num">${i+1}</div>
          <div class="rec-segment">${esc(cleanLabel)}</div>
        </div>
        <div class="rec-rate">${s.conv_rate}% conv.</div>
        <div class="rec-desc">${esc(desc)}</div>
        <div class="rec-tags">
          ${tagType ? `<span class="rec-tag">${tagType}</span>` : ''}
          <span class="rec-tag">${s.total} personas</span>
          <span class="rec-tag">${s.converted} converted</span>
        </div>
      </div>
    `;
  }).join('');

  document.getElementById('rec-grid').innerHTML = html;
}

function renderPersonas(all, filter) {

  if (!list.length) {
    document.getElementById('pgrid').innerHTML = `<div class="loading">No personas.</div>`;
    return;
  }
  const scoreColor = s => s>=7?'var(--green)':s>=5?'var(--yellow)':'var(--red)';
  const outcomeLabel = { converted:'✓ Converted', dropped:'✗ Dropped', undecided:'~ Undecided' };
  document.getElementById('pgrid').innerHTML = list.map(p => {
    const sc = scoreColor(p.score);
    const tech = p.tech_comfort || p.tech || 0;
    return `
      <div class="pcard">
        <div class="pc-top">
          <div class="pc-avatar">
            <img src="${avatarUrl(p.name)}" alt="${esc(p.name)}" loading="lazy" onerror="this.parentElement.style.background='var(--s3)'"/>
          </div>
          <div class="pc-info">
            <div class="pc-name">${esc(p.name)}</div>
            <div class="pc-sub">${p.age||''} · ${esc(p.location||'')} · ${esc(p.role||'')}</div>
          </div>
          <div class="pc-outcome oc-${p.outcome}">${outcomeLabel[p.outcome]||p.outcome}</div>
        </div>
        <div class="pc-score">
          <div class="pc-score-track"><div class="pc-score-fill" style="width:${(p.score||0)*10}%;background:${sc}"></div></div>
          <div class="pc-score-val" style="color:${sc}">${p.score||0}/10</div>
        </div>
        <div class="pc-expect">${esc(p.pre_expectation||p.key_moment||'')}</div>
        <div class="pc-thoughts">
          ${(p.thoughts||[]).map(t=>`
            <div class="thought t-${t.type}">
              <div class="ti">${t.type==='fail'?'✗':t.type==='warn'?'⚠':'→'}</div>
              <div>${esc(t.quote)}</div>
            </div>
          `).join('')}
        </div>
        <div class="pc-tags">
          <span class="ptag">tech ${tech}/10</span>
          <span class="ptag">${esc(p.channel||'')}</span>
          <span class="ptag">${esc(p.use_case||'')}</span>
        </div>
      </div>
    `;
  }).join('');
}


// ── PH Audit Report ───────────────────────────────────────────────────────
function renderPHReport() {
  const d = phReportData;
  if (!d) return;
  document.getElementById('tb-title').textContent = 'Product Hunt Audience Audit';
  document.getElementById('tb-sub').textContent = d.meta.run_date + ' · ' + d.meta.total + ' PH-profile personas';
  document.getElementById('tb-actions').innerHTML = '';

  const s = d.summary;
  const scoreColor = v => v>=7?'var(--green)':v>=5?'var(--yellow)':'var(--red)';
  const outcomeLabel = { converted:'✓ Converted', dropped:'✗ Dropped', undecided:'~ Undecided' };

  const issueHTML = (d.top_issues||[]).map(issue => {
    const bg = issue.priority==='P1' ? 'var(--rd-dim)' : issue.priority==='P2' ? 'var(--yw-dim)' : 'rgba(255,255,255,.04)';
    const clr = issue.priority==='P1' ? 'var(--red)' : issue.priority==='P2' ? 'var(--yellow)' : 'var(--muted)';
    return `<div style="background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:8px;display:flex;gap:12px;align-items:flex-start">
      <div style="flex-shrink:0;padding:2px 8px;border-radius:5px;font-size:10px;font-weight:800;background:${bg};color:${clr}">${esc(issue.priority)}</div>
      <div>
        <div style="font-size:13px;font-weight:600;color:#fff;margin-bottom:4px">${esc(issue.title)}</div>
        <div style="font-size:11px;color:var(--muted);margin-bottom:6px">Affected ${issue.affected} personas · ${esc((issue.segments||[]).join(', '))}</div>
        <div style="font-size:12px;color:var(--text);line-height:1.5">${esc(issue.description)}</div>
      </div>
    </div>`;
  }).join('');

  const personaHTML = (d.personas||[]).map(p => {
    const sc = scoreColor(p.score);
    const tech = p.tech_comfort || p.tech || 0;
    const oc = p.outcome;
    return `<div class="pcard">
      <div class="pc-top">
        <div class="pc-avatar"><img src="${avatarUrl(p.name)}" alt="${esc(p.name)}" loading="lazy" onerror="this.parentElement.style.background='var(--s3)'"/></div>
        <div class="pc-info">
          <div class="pc-name">${esc(p.name)}</div>
          <div class="pc-sub">${p.age||''} · ${esc(p.location||'')} · ${esc(p.role||'')}</div>
        </div>
        <div class="pc-outcome oc-${oc}">${outcomeLabel[oc]||oc}</div>
      </div>
      <div class="pc-score">
        <div class="pc-score-track"><div class="pc-score-fill" style="width:${(p.score||0)*10}%;background:${sc}"></div></div>
        <div class="pc-score-val" style="color:${sc}">${p.score||0}/10</div>
      </div>
      <div class="pc-expect">${esc(p.pre_expectation||'')}</div>
      <div style="font-size:11px;color:var(--muted);margin:6px 0 4px">💬 Biggest gap: ${esc(p.biggest_gap||'')}</div>
      <div class="pc-thoughts">
        ${(p.thoughts||[]).map(t=>`<div class="thought t-${t.type}"><div class="ti">${t.type==='fail'?'✗':t.type==='warn'?'⚠':'→'}</div><div>${esc(t.quote)}</div></div>`).join('')}
      </div>
      <div class="pc-tags">
        <span class="ptag">tech ${tech}/10</span>
        <span class="ptag">${esc(p.channel||'')}</span>
        <span class="ptag">${esc(p.use_case||'')}</span>
      </div>
    </div>`;
  }).join('');

  document.getElementById('main-content').innerHTML = `
    <div class="stats">
      <div class="stat"><div class="stat-num c-orange">${d.meta.total}</div><div class="stat-lbl">PH Personas</div></div>
      <div class="stat"><div class="stat-num c-green">${s.converted}</div><div class="stat-lbl">Converted</div></div>
      <div class="stat"><div class="stat-num c-red">${s.dropped}</div><div class="stat-lbl">Dropped</div></div>
      <div class="stat"><div class="stat-num c-yellow">${s.undecided}</div><div class="stat-lbl">Undecided</div></div>
      <div class="stat"><div class="stat-num" style="color:${scoreColor(s.avg_score)}">${s.avg_score}</div><div class="stat-lbl">Avg Score</div></div>
      <div class="stat"><div class="stat-num c-orange">${s.conversion_rate}%</div><div class="stat-lbl">Conv. Rate</div></div>
    </div>
    <div class="sh"><div class="sh-label">Top Issues (PH Audience)</div><div class="sh-line"></div></div>
    ${issueHTML}
    <div class="sh" style="margin-top:24px"><div class="sh-label">20 Personas · PH Profile</div><div class="sh-line"></div></div>
    <div class="pgrid" id="pgrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px">${personaHTML}</div>
  `;
}

init();
</script>
</body>
</html>
