<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Betax — Agent Report</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#09080a;--surface:#111013;--surface2:#191720;--border:rgba(255,255,255,.07);
      --text:#f0ece8;--muted:#7a7580;--dim:#3a3840;
      --orange:#ef6820;--orange-dim:rgba(239,104,32,.12);--orange-border:rgba(239,104,32,.3);
      --green:#22c55e;--green-dim:rgba(34,197,94,.1);
      --red:#ef4444;--red-dim:rgba(239,68,68,.1);
      --yellow:#f59e0b;--yellow-dim:rgba(245,158,11,.1);
      --blue:#60a5fa;--blue-dim:rgba(96,165,250,.08);
    }
    body{font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}

    /* ── Topbar ── */
    .topbar{position:sticky;top:0;z-index:100;height:48px;background:rgba(9,8,10,.88);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px}
    .logo{font-size:16px;font-weight:900;letter-spacing:-.5px;color:#fff}
    .logo em{color:var(--orange);font-style:normal}
    .divider{width:1px;height:16px;background:var(--border)}
    .pg-title{font-size:12px;color:var(--muted)}
    .topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
    .btn-sm{font-size:11px;padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-family:inherit;transition:all .15s}
    .btn-sm:hover{border-color:rgba(255,255,255,.2);color:var(--text)}

    /* ── Layout ── */
    .page{max-width:1200px;margin:0 auto;padding:32px 24px 80px}

    /* ── Report header ── */
    .rh{display:flex;align-items:flex-start;justify-content:space-between;gap:24px;margin-bottom:32px;flex-wrap:wrap}
    .rh-left{}
    .rh-url{font-size:11px;color:var(--orange);font-family:monospace;background:var(--orange-dim);border:1px solid var(--orange-border);padding:3px 10px;border-radius:100px;display:inline-block;margin-bottom:10px}
    .rh-title{font-size:22px;font-weight:800;color:#fff;letter-spacing:-.4px;margin-bottom:4px}
    .rh-meta{font-size:11px;color:var(--muted)}
    .rh-meta span{color:var(--dim);margin:0 4px}

    /* ── Metric row ── */
    .metrics{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:32px}
    .met{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 18px}
    .met-num{font-size:26px;font-weight:900;line-height:1;letter-spacing:-.5px}
    .met-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-top:5px}
    .c-white{color:#fff}.c-orange{color:var(--orange)}.c-green{color:var(--green)}.c-red{color:var(--red)}.c-yellow{color:var(--yellow)}

    /* ── Section header ── */
    .sh{display:flex;align-items:center;gap:10px;margin-bottom:16px}
    .sh-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted)}
    .sh-line{flex:1;height:1px;background:var(--border)}

    /* ── STAGE FUNNEL ── */
    .funnel-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:28px}
    .funnel-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:20px}
    .funnel-title{font-size:15px;font-weight:700;color:#fff}
    .funnel-sub{font-size:11px;color:var(--muted)}

    .funnel-stages{display:flex;flex-direction:column;gap:6px}
    .f-row{display:grid;grid-template-columns:110px 1fr 44px 44px;align-items:center;gap:12px}
    .f-stage{font-size:12px;font-weight:600;color:var(--text);text-align:right}
    .f-bar-area{position:relative;height:32px}
    .f-bar-bg{position:absolute;inset:0;background:rgba(255,255,255,.03);border-radius:6px;overflow:hidden}
    .f-bar-fill{height:100%;border-radius:6px;display:flex;align-items:center;padding-left:12px;font-size:11px;font-weight:700;transition:width .8s cubic-bezier(.16,1,.3,1)}
    .f-bar-fill.c-ok{background:linear-gradient(90deg,rgba(34,197,94,.25),rgba(34,197,94,.12));color:var(--green)}
    .f-bar-fill.c-warn{background:linear-gradient(90deg,rgba(245,158,11,.2),rgba(245,158,11,.08));color:var(--yellow)}
    .f-bar-fill.c-danger{background:linear-gradient(90deg,rgba(239,68,68,.22),rgba(239,68,68,.08));color:var(--red)}
    .f-bar-fill.c-end{background:linear-gradient(90deg,rgba(239,104,32,.3),rgba(239,104,32,.1));color:var(--orange)}
    .f-drop-badge{background:var(--red-dim);border:1px solid rgba(239,68,68,.2);color:var(--red);font-size:10px;font-weight:700;padding:2px 7px;border-radius:100px;text-align:center;white-space:nowrap}
    .f-drop-badge.none{background:transparent;border-color:transparent;color:var(--dim)}
    .f-pct{font-size:12px;font-weight:700;color:var(--muted);text-align:right}
    .f-reason{grid-column:2/-1;font-size:11px;color:var(--muted);padding:0 0 6px 0;line-height:1.4;border-bottom:1px solid var(--border);margin-bottom:2px}
    .f-reason:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
    .f-outcome-row{display:flex;gap:16px;margin-top:16px;padding-top:16px;border-top:1px solid var(--border)}
    .f-outcome-item{display:flex;align-items:center;gap:6px;font-size:12px}
    .f-outcome-dot{width:8px;height:8px;border-radius:50%}
    .f-outcome-val{font-weight:700}

    /* ── Two-col layout ── */
    .two-col{display:grid;grid-template-columns:1fr 320px;gap:16px;margin-bottom:28px;align-items:start}

    /* ── Issues ── */
    .issues-list{display:flex;flex-direction:column;gap:8px}
    .issue{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;gap:12px}
    .issue:hover{border-color:rgba(255,255,255,.12)}
    .issue-pri{font-size:10px;font-weight:800;padding:3px 8px;border-radius:5px;flex-shrink:0;margin-top:1px;letter-spacing:.04em}
    .p1{background:rgba(239,68,68,.15);color:var(--red)}
    .p2{background:rgba(245,158,11,.12);color:var(--yellow)}
    .p3{background:rgba(34,197,94,.1);color:var(--green)}
    .issue-body{flex:1;min-width:0}
    .issue-title{font-size:13px;font-weight:600;color:#fff;margin-bottom:3px}
    .issue-desc{font-size:11px;color:var(--muted);line-height:1.5}
    .issue-segs{display:flex;flex-wrap:wrap;gap:4px;margin-top:7px}
    .seg{font-size:10px;padding:2px 7px;border-radius:100px;background:rgba(255,255,255,.04);color:var(--muted)}
    .issue-count{text-align:right;flex-shrink:0}
    .issue-count .num{font-size:22px;font-weight:800;color:var(--orange);line-height:1}
    .issue-count .lbl{font-size:9px;color:var(--dim);font-weight:600;text-transform:uppercase;letter-spacing:.06em}

    /* ── Outcome panel ── */
    .outcome-panel{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px}
    .outcome-panel-title{font-size:12px;font-weight:700;color:#fff;margin-bottom:16px}
    .outcome-bar-row{margin-bottom:12px}
    .ob-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px}
    .ob-label{font-size:12px;font-weight:600}
    .ob-count{font-size:12px;font-weight:700}
    .ob-track{height:8px;background:rgba(255,255,255,.05);border-radius:4px;overflow:hidden}
    .ob-fill{height:100%;border-radius:4px;transition:width .8s cubic-bezier(.16,1,.3,1)}
    .ob-fill.green{background:linear-gradient(90deg,#22c55e,#16a34a)}
    .ob-fill.yellow{background:linear-gradient(90deg,#f59e0b,#d97706)}
    .ob-fill.red{background:linear-gradient(90deg,#ef4444,#dc2626)}
    .divider-h{height:1px;background:var(--border);margin:16px 0}
    .score-display{text-align:center;padding:8px 0}
    .score-big{font-size:40px;font-weight:900;color:var(--orange);line-height:1;letter-spacing:-1px}
    .score-sub{font-size:11px;color:var(--muted);margin-top:4px}

    /* ── Segment breakdown ── */
    .seg-breakdown{margin-top:16px}
    .seg-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
    .seg-name{font-size:11px;color:var(--muted);width:90px;flex-shrink:0}
    .seg-track{flex:1;height:6px;background:rgba(255,255,255,.04);border-radius:3px;overflow:hidden}
    .seg-fill{height:100%;border-radius:3px}
    .seg-val{font-size:11px;font-weight:700;color:var(--text);width:28px;text-align:right}

    /* ── Persona section ── */
    .filter-tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
    .ftab{font-size:12px;padding:6px 14px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-family:inherit;transition:all .12s;display:flex;align-items:center;gap:5px}
    .ftab:hover{border-color:rgba(255,255,255,.15);color:var(--text)}
    .ftab.active{background:var(--orange-dim);border-color:var(--orange-border);color:var(--orange)}
    .ftab .badge{font-size:10px;background:rgba(255,255,255,.07);color:var(--muted);padding:1px 6px;border-radius:100px}
    .ftab.active .badge{background:rgba(239,104,32,.2);color:var(--orange)}

    .pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:10px}
    .pcard{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;transition:border-color .12s}
    .pcard:hover{border-color:rgba(255,255,255,.14)}
    .pc-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:11px}
    .pc-av{width:34px;height:34px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800}
    .pc-info{flex:1;min-width:0}
    .pc-name{font-size:13px;font-weight:700;color:#fff}
    .pc-sub{font-size:11px;color:var(--muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .pc-badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:6px;flex-shrink:0;letter-spacing:.03em}
    .pc-badge.converted{background:var(--green-dim);color:var(--green)}
    .pc-badge.dropped{background:var(--red-dim);color:var(--red)}
    .pc-badge.undecided{background:var(--yellow-dim);color:var(--yellow)}

    .pc-score-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
    .pc-score-track{flex:1;height:3px;background:rgba(255,255,255,.06);border-radius:2px}
    .pc-score-fill{height:3px;border-radius:2px}
    .pc-score-val{font-size:11px;font-weight:700;width:28px;text-align:right}

    .pc-expectation{font-size:11px;color:var(--muted);line-height:1.4;margin-bottom:8px;padding:8px 10px;background:var(--surface2);border-radius:6px;font-style:italic}
    .pc-expectation::before{content:'Expected: ';font-weight:600;font-style:normal;color:var(--dim);font-size:10px}

    .pc-thoughts{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
    .thought{font-size:11px;line-height:1.4;padding:5px 8px;border-radius:5px;display:flex;gap:6px;align-items:flex-start}
    .thought-icon{flex-shrink:0;font-size:10px;margin-top:1px;width:12px}
    .thought.norm{background:rgba(255,255,255,.02);color:#c0bbb8}
    .thought.warn{background:rgba(245,158,11,.07);color:#c8a84b}
    .thought.fail{background:rgba(239,68,68,.07);color:#c07070}

    .pc-tags{display:flex;gap:4px;flex-wrap:wrap}
    .ptag{font-size:10px;padding:2px 7px;border-radius:100px;background:rgba(255,255,255,.04);color:var(--muted)}

    /* ── Empty state ── */
    .empty{text-align:center;padding:48px;color:var(--dim);font-size:13px}

    /* ── Responsive ── */
    @media(max-width:900px){
      .two-col{grid-template-columns:1fr}
      .metrics{grid-template-columns:repeat(3,1fr)}
      .f-row{grid-template-columns:80px 1fr 40px 36px}
    }
    @media(max-width:600px){
      .metrics{grid-template-columns:repeat(2,1fr)}
      .pgrid{grid-template-columns:1fr}
      .f-stage{font-size:10px}
    }
  </style>
</head>
<body>

<div class="topbar">
  <div class="logo">Bet<em>ax</em></div>
  <div class="divider"></div>
  <div class="pg-title">Agent Report</div>
  <div class="topbar-right">
    <a class="btn-sm" href="/admin?token=TOKEN_PLACEHOLDER">← Waitlist</a>
  </div>
</div>

<div class="page">

  <!-- Header -->
  <div class="rh">
    <div class="rh-left">
      <div class="rh-url" id="rh-url">—</div>
      <div class="rh-title">Persona Agent Evaluation</div>
      <div class="rh-meta" id="rh-meta">—</div>
    </div>
  </div>

  <!-- Metrics -->
  <div class="metrics">
    <div class="met"><div class="met-num c-white" id="m-total">—</div><div class="met-lbl">Personas run</div></div>
    <div class="met"><div class="met-num c-orange" id="m-conv">—</div><div class="met-lbl">Conversion rate</div></div>
    <div class="met"><div class="met-num c-orange" id="m-score">—</div><div class="met-lbl">Avg score</div></div>
    <div class="met"><div class="met-num c-green" id="m-converted">—</div><div class="met-lbl">Converted</div></div>
    <div class="met"><div class="met-num c-red" id="m-dropped">—</div><div class="met-lbl">Dropped</div></div>
  </div>

  <!-- Stage Funnel -->
  <div class="sh"><div class="sh-label">Dropoff by stage</div><div class="sh-line"></div></div>
  <div class="funnel-wrap">
    <div class="funnel-header">
      <div class="funnel-title">User journey — where they leave and why</div>
      <div class="funnel-sub" id="f-sub">—</div>
    </div>
    <div class="funnel-stages" id="funnel-stages"></div>
    <div class="f-outcome-row" id="f-outcome-row"></div>
  </div>

  <!-- Two-col: Issues + Outcome -->
  <div class="two-col">
    <div>
      <div class="sh"><div class="sh-label">Top issues</div><div class="sh-line"></div></div>
      <div class="issues-list" id="issues-list"></div>
    </div>
    <div>
      <div class="sh"><div class="sh-label">Outcome breakdown</div><div class="sh-line"></div></div>
      <div class="outcome-panel">
        <div class="outcome-bar-row">
          <div class="ob-top"><span class="ob-label c-green">Converted</span><span class="ob-count c-green" id="op-conv-n">—</span></div>
          <div class="ob-track"><div class="ob-fill green" id="op-conv-bar" style="width:0"></div></div>
        </div>
        <div class="outcome-bar-row">
          <div class="ob-top"><span class="ob-label c-yellow">Undecided</span><span class="ob-count c-yellow" id="op-und-n">—</span></div>
          <div class="ob-track"><div class="ob-fill yellow" id="op-und-bar" style="width:0"></div></div>
        </div>
        <div class="outcome-bar-row">
          <div class="ob-top"><span class="ob-label c-red">Dropped</span><span class="ob-count c-red" id="op-drop-n">—</span></div>
          <div class="ob-track"><div class="ob-fill red" id="op-drop-bar" style="width:0"></div></div>
        </div>
        <div class="divider-h"></div>
        <div class="score-display">
          <div class="score-big" id="op-score">—</div>
          <div class="score-sub">average score / 10</div>
        </div>
        <div class="divider-h"></div>
        <div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px">By segment</div>
        <div id="seg-breakdown" class="seg-breakdown"></div>
      </div>
    </div>
  </div>

  <!-- Personas -->
  <div class="sh"><div class="sh-label">All personas</div><div class="sh-line"></div></div>
  <div class="filter-tabs" id="filter-tabs"></div>
  <div class="pgrid" id="pgrid"></div>

</div>

<script>
const token = new URLSearchParams(location.search).get('token') || '';

// Fix back button token
document.querySelector('.btn-sm').href = `/admin?token=${token}`;

// Avatar helpers
const AV_COLORS = ['#3b82f6','#8b5cf6','#ec4899','#f59e0b','#22c55e','#ef4444','#06b6d4','#a855f7'];
const avColor = n => AV_COLORS[n.charCodeAt(0) % AV_COLORS.length];
const initials = n => n.split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase();
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

// Score → color
function scoreColor(s) {
  if (s >= 7) return 'var(--green)';
  if (s >= 5) return 'var(--yellow)';
  return 'var(--red)';
}

// Funnel bar color by drop %
function funnelClass(drop_pct) {
  if (drop_pct >= 15) return 'c-danger';
  if (drop_pct >= 8)  return 'c-warn';
  return 'c-ok';
}

async function load() {
  const res = await fetch(`/api/admin/report-data?token=${token}`);
  if (!res.ok) {
    document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;color:var(--muted)">Unauthorized — check your token.</div>';
    return;
  }
  render(await res.json());
}

function render(data) {
  const { meta, summary, stage_dropoff, top_issues, personas } = data;
  const total = summary.total_personas;

  // Header
  document.getElementById('rh-url').textContent = meta.url;
  document.getElementById('rh-meta').textContent = `${meta.run_date} · ${total} personas · ${meta.model}`;

  // Metrics
  document.getElementById('m-total').textContent = total;
  document.getElementById('m-conv').textContent = summary.conversion_rate + '%';
  document.getElementById('m-score').textContent = summary.avg_score + '/10';
  document.getElementById('m-converted').textContent = summary.converted;
  document.getElementById('m-dropped').textContent = summary.dropped;

  // ── Stage Funnel ──
  document.getElementById('f-sub').textContent = `${stage_dropoff.length} stages · ${summary.dropped} total dropped`;
  const maxEntered = stage_dropoff[0].entered;

  const stagesHTML = stage_dropoff.map((s, i) => {
    const pct = Math.round(s.entered / maxEntered * 100);
    const isLast = i === stage_dropoff.length - 1;
    const barClass = isLast ? 'c-end' : funnelClass(s.drop_pct);
    const badgeHTML = s.dropped > 0
      ? `<div class="f-drop-badge">−${s.dropped}</div>`
      : isLast
        ? `<div class="f-drop-badge none">CTA</div>`
        : `<div class="f-drop-badge none">—</div>`;

    return `
      <div class="f-row">
        <div class="f-stage">${esc(s.stage)}</div>
        <div class="f-bar-area">
          <div class="f-bar-bg">
            <div class="f-bar-fill ${barClass}" style="width:0" data-w="${pct}">
              ${s.entered} users
            </div>
          </div>
        </div>
        ${badgeHTML}
        <div class="f-pct">${pct}%</div>
      </div>
      <div class="f-row" style="margin-top:-2px;margin-bottom:6px">
        <div></div>
        <div class="f-reason">${esc(s.main_reason)}</div>
      </div>
    `;
  }).join('');

  document.getElementById('funnel-stages').innerHTML = stagesHTML;

  // Outcome row at bottom of funnel
  document.getElementById('f-outcome-row').innerHTML = `
    <div class="f-outcome-item"><div class="f-outcome-dot" style="background:var(--green)"></div><span class="f-outcome-val c-green">${summary.converted}</span><span style="font-size:11px;color:var(--muted)">converted</span></div>
    <div class="f-outcome-item"><div class="f-outcome-dot" style="background:var(--yellow)"></div><span class="f-outcome-val c-yellow">${summary.undecided}</span><span style="font-size:11px;color:var(--muted)">undecided</span></div>
    <div class="f-outcome-item"><div class="f-outcome-dot" style="background:var(--red)"></div><span class="f-outcome-val c-red">${summary.dropped}</span><span style="font-size:11px;color:var(--muted)">dropped</span></div>
    <div style="margin-left:auto;font-size:11px;color:var(--muted)"><strong style="color:var(--orange)">${summary.conversion_rate}%</strong> conversion rate</div>
  `;

  // Animate bars
  requestAnimationFrame(() => {
    document.querySelectorAll('.f-bar-fill[data-w]').forEach(el => {
      el.style.width = el.dataset.w + '%';
    });
  });

  // ── Issues ──
  document.getElementById('issues-list').innerHTML = top_issues.map(issue => `
    <div class="issue">
      <div class="issue-pri ${issue.priority.toLowerCase()}">${issue.priority}</div>
      <div class="issue-body">
        <div class="issue-title">${esc(issue.title)}</div>
        <div class="issue-desc">${esc(issue.description)}</div>
        <div class="issue-segs">${(issue.segments||[]).map(s=>`<span class="seg">${esc(s)}</span>`).join('')}</div>
      </div>
      <div class="issue-count">
        <div class="num">${issue.affected}</div>
        <div class="lbl">affected</div>
      </div>
    </div>
  `).join('');

  // ── Outcome panel ──
  document.getElementById('op-conv-n').textContent = summary.converted;
  document.getElementById('op-und-n').textContent = summary.undecided;
  document.getElementById('op-drop-n').textContent = summary.dropped;
  document.getElementById('op-score').textContent = summary.avg_score;

  setTimeout(() => {
    document.getElementById('op-conv-bar').style.width = (summary.converted/total*100) + '%';
    document.getElementById('op-und-bar').style.width = (summary.undecided/total*100) + '%';
    document.getElementById('op-drop-bar').style.width = (summary.dropped/total*100) + '%';
  }, 100);

  // Segment breakdown from personas
  const segMap = {};
  personas.forEach(p => {
    if (!segMap[p.channel]) segMap[p.channel] = { total:0, converted:0 };
    segMap[p.channel].total++;
    if (p.outcome === 'converted') segMap[p.channel].converted++;
  });
  const topSegs = Object.entries(segMap).sort((a,b)=>b[1].total-a[1].total).slice(0,5);
  document.getElementById('seg-breakdown').innerHTML = topSegs.map(([ch, d]) => {
    const convPct = Math.round(d.converted/d.total*100);
    return `
      <div class="seg-row">
        <div class="seg-name">${esc(ch)}</div>
        <div class="seg-track"><div class="seg-fill" style="width:${convPct}%;background:${convPct>30?'var(--green)':convPct>15?'var(--yellow)':'var(--red)'}"></div></div>
        <div class="seg-val">${convPct}%</div>
      </div>
    `;
  }).join('');

  // ── Filter tabs ──
  const outcomes = ['all','converted','dropped','undecided'];
  const counts = { all: personas.length };
  outcomes.slice(1).forEach(o => counts[o] = personas.filter(p=>p.outcome===o).length);

  document.getElementById('filter-tabs').innerHTML = outcomes.map(o => `
    <button class="ftab${o==='all'?' active':''}" data-filter="${o}">
      ${o==='all'?'All':o.charAt(0).toUpperCase()+o.slice(1)}
      <span class="badge">${counts[o]}</span>
    </button>
  `).join('');

  renderPersonas(personas, 'all');

  document.querySelectorAll('.ftab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.ftab').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      renderPersonas(personas, btn.dataset.filter);
    });
  });
}

function renderPersonas(all, filter) {
  const list = filter === 'all' ? all : all.filter(p=>p.outcome===filter);
  if (!list.length) {
    document.getElementById('pgrid').innerHTML = '<div class="empty">No personas in this filter.</div>';
    return;
  }
  document.getElementById('pgrid').innerHTML = list.map(p => {
    const color = avColor(p.name);
    const scoreColor_val = scoreColor(p.score);
    const outcomeLabel = {converted:'✓ Converted', dropped:'✗ Dropped', undecided:'~ Undecided'}[p.outcome] || p.outcome;
    return `
      <div class="pcard">
        <div class="pc-top">
          <div class="pc-av" style="background:${color}18;color:${color}">${initials(p.name)}</div>
          <div class="pc-info">
            <div class="pc-name">${esc(p.name)}</div>
            <div class="pc-sub">${p.age} · ${esc(p.location)} · ${esc(p.role)}</div>
          </div>
          <div class="pc-badge ${p.outcome}">${outcomeLabel}</div>
        </div>
        <div class="pc-score-row">
          <div class="pc-score-track"><div class="pc-score-fill" style="width:${p.score*10}%;background:${scoreColor_val}"></div></div>
          <div class="pc-score-val" style="color:${scoreColor_val}">${p.score}/10</div>
        </div>
        <div class="pc-expectation">${esc(p.pre_expectation||p.key_moment||'')}</div>
        <div class="pc-thoughts">
          ${(p.thoughts||[]).map(t=>`
            <div class="thought ${t.type}">
              <div class="thought-icon">${t.type==='fail'?'✗':t.type==='warn'?'⚠':'→'}</div>
              <div>${esc(t.quote)}</div>
            </div>
          `).join('')}
        </div>
        <div class="pc-tags">
          <span class="ptag">tech ${p.tech_comfort||p.tech}/10</span>
          <span class="ptag">${esc(p.channel)}</span>
          <span class="ptag">${esc(p.use_case)}</span>
        </div>
      </div>
    `;
  }).join('');
}

load();
</script>
</body>
</html>
